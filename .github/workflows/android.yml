name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Build debug APK'
        required: false
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "java.home=$JAVA_HOME" >> android/local.properties

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: polaris-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Report result
        run: |
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            SIZE=$(du -h android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "✅ APK 构建成功！大小: $SIZE"
            echo "文件路径: android/app/build/outputs/apk/debug/app-debug.apk"
          else
            echo "❌ APK 未生成"
            exit 1
          fi
