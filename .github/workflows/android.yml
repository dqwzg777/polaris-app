name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Build debug APK'
        required: false
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install
        working-directory: .

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "java.home=$JAVA_HOME" >> android/local.properties

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        continue-on-error: true

      - name: Check build result
        id: check
        run: |
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            SIZE=$(du -h android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "✅ APK 构建成功！大小: $SIZE"
            echo "file_path=android/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
          else
            echo "❌ APK 未生成"
            echo "file_path=" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload APK
        if: steps.check.outputs.file_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: polaris-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
