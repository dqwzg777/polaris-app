name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -x bundleDebugJsAndAssets -x createBundleDebugJsAndAssets 2>&1 | tee build.log
          echo "=== Gradle Build Log (last 50 lines) ==="
          tail -50 build.log
          echo "=== APK Search ==="
          find . -name "*.apk" -exec ls -lh {} \;
          echo "=== APK found ==="

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: polaris-app-debug
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/*/app-debug.apk
            android/app/build/outputs/apk/*/*/app-debug.apk
          if-no-files-found: error
          retention-days: 7
