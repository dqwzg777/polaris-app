name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Build debug APK'
        required: false
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "java.home=$JAVA_HOME" >> android/local.properties

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50
          echo "=== APK Search ==="
find . -type f -name "*.apk" 2>/dev/null
          find . -name "*.apk" -exec ls -lh {} \;
          echo "=== Done ==="

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: polaris-app-debug
          path: android/**/*.apk
          if-no-files-found: error
          retention-days: 7
