name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          mkdir -p /opt/android-sdk
          echo "sdk.dir=/opt/android-sdk" >> android/local.properties

      - name: Export JS Bundle
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed --platform android --entry-file node_modules/expo/AppEntry.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res 2>&1 || \
          npx react-native bundle --platform android --dev false --entry-file node_modules/expo/AppEntry.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res 2>&1

      - name: Verify Bundle
        run: |
          ls -lh android/app/src/main/assets/ 2>/dev/null || echo "No assets dir"
          if [ -f android/app/src/main/assets/index.android.bundle ]; then
            echo "✅ JS Bundle created: $(ls -lh android/app/src/main/assets/index.android.bundle)"
          else
            echo "❌ JS Bundle NOT found!"
            find . -name "*.bundle" 2>/dev/null | head -5
          fi

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log
          echo "=== Gradle tail ==="
          tail -60 build.log
          echo "=== APK search ==="
          find . -name "*.apk" 2>/dev/null
          ls -laR app/build/outputs/apk 2>/dev/null || echo "No apk outputs"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: polaris-app-debug
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/*/debug/*.apk
            android/app/build/outputs/apk/*/*/*.apk
            android/app/build/outputs/**/*.apk
          if-no-files-found: error
          retention-days: 3
