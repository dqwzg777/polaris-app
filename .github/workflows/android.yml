name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          echo "sdk.dir=/opt/android-sdk" >> android/local.properties

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --warning-mode all 2>&1 | tee build.log
          echo "=== BUILD LOG TAIL ==="
          tail -80 build.log
          echo "=== SEARCHING FOR APK ==="
          find . -name "*.apk" 2>/dev/null | head -20
          find . -type d -name "outputs" 2>/dev/null | head -10
          ls -laR app/build/outputs 2>/dev/null || echo "No outputs dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: polaris-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 3
