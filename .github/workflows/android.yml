name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Build debug APK'
        required: false
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "java.home=$JAVA_HOME" >> android/local.properties

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee gradle_build.log
          echo "=== Checking for APK ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== APK locations ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug dir not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: polaris-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
